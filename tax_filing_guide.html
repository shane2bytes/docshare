<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韩国综合所得税申告引导 | 모두채움 신고 가이드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0066CC;
    --primary-dark: #004499;
    --primary-light: #3388DD;
    --primary-ultra-light: #E8F4FF;
    --success: #00C853;
    --success-light: #E8FFF0;
    --warning: #FF6B35;
    --warning-light: #FFF3EE;
    --bg: #F0F4FA;
    --card-bg: #FFFFFF;
    --text-dark: #1A2B4A;
    --text-mid: #4A5568;
    --text-light: #718096;
    --border: #DDE4EF;
    --shadow: 0 4px 20px rgba(0,102,204,0.1);
    --shadow-hover: 0 8px 30px rgba(0,102,204,0.18);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-dark);
    min-height: 100vh;
  }
  body.ko { font-family: 'Noto Sans KR', 'Noto Sans SC', sans-serif; }

  /* ===== HEADER ===== */
  .site-header {
    background: linear-gradient(135deg, #003380 0%, #0055B3 40%, #0066CC 70%, #0088FF 100%);
    padding: 40px 24px 80px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute;
    top: -50px; right: -50px;
    width: 300px; height: 300px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .site-header::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 400px; height: 400px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  /* ===== LANGUAGE SWITCHER ===== */
  .lang-switcher {
    position: absolute;
    top: 16px;
    right: 20px;
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 30px;
    padding: 4px;
    z-index: 100;
  }
  .lang-btn {
    padding: 6px 14px;
    border: none;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    background: transparent;
    color: rgba(255,255,255,0.7);
    font-family: inherit;
  }
  .lang-btn.active {
    background: #fff;
    color: var(--primary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .lang-btn:hover:not(.active) {
    background: rgba(255,255,255,0.2);
    color: #fff;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 50px;
    padding: 6px 16px;
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }
  .header-badge .dot {
    width: 8px; height: 8px;
    background: #00ff88;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }
  .site-header h1 {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .site-header p {
    font-size: 16px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 6px;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
  }

  /* ===== PROGRESS OVERVIEW (floats below header) ===== */
  .progress-card {
    max-width: 860px;
    margin: -40px auto 0;
    padding: 0 16px;
    position: relative;
    z-index: 10;
  }
  .progress-inner {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: 0 8px 40px rgba(0,51,128,0.15);
    padding: 28px 32px;
  }
  .progress-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .progress-label {
    font-size: 14px;
    color: var(--text-mid);
    font-weight: 500;
  }
  .progress-pct {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
    line-height: 1;
  }
  .progress-pct span {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-light);
    margin-left: 2px;
  }
  .progress-bar-track {
    width: 100%;
    height: 10px;
    background: #E8F0FF;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #0066CC, #0088FF);
    border-radius: 10px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }
  .step-dots {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
  }
  .step-dots::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 20px; right: 20px;
    height: 2px;
    background: var(--border);
    transform: translateY(-50%);
    z-index: 0;
  }
  .step-dot-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    z-index: 1;
  }
  .step-dot {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #E8F0FF;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-light);
    transition: all 0.3s ease;
    position: relative;
  }
  .step-dot.active {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
    box-shadow: 0 0 0 4px rgba(0,102,204,0.2);
    transform: scale(1.1);
  }
  .step-dot.done {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }
  .step-dot.done::after {
    content: '✓';
    position: absolute;
    font-size: 14px;
  }
  .step-dot.done .dot-num { display: none; }
  .step-dot-label {
    font-size: 10px;
    color: var(--text-light);
    text-align: center;
    max-width: 60px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .step-dot-item.active .step-dot-label { color: var(--primary); font-weight: 600; }
  .step-dot-item.done .step-dot-label { color: var(--success); }

  /* ===== MAIN CONTENT ===== */
  .main-content {
    max-width: 860px;
    margin: 32px auto 60px;
    padding: 0 16px;
  }

  /* ===== STEP CARD ===== */
  .step-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
    transition: box-shadow 0.3s ease, transform 0.2s ease;
    border: 1.5px solid transparent;
  }
  .step-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-1px);
  }
  .step-card.active-card {
    border-color: var(--primary);
    box-shadow: 0 4px 24px rgba(0,102,204,0.15);
  }
  .step-card.completed-card {
    border-color: var(--success);
  }

  .step-header {
    display: flex;
    align-items: center;
    padding: 20px 24px;
    cursor: pointer;
    user-select: none;
    gap: 16px;
    transition: background 0.2s;
  }
  .step-header:hover { background: #FAFCFF; }

  .step-num-badge {
    width: 48px; height: 48px;
    min-width: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    box-shadow: 0 4px 12px rgba(0,102,204,0.3);
    transition: all 0.3s ease;
  }
  .step-card.completed-card .step-num-badge {
    background: linear-gradient(135deg, var(--success), #00E676);
    box-shadow: 0 4px 12px rgba(0,200,83,0.3);
  }
  .step-card.completed-card .step-num-badge::after {
    content: '✓';
    font-size: 20px;
  }
  .step-card.completed-card .step-num-badge .num-text { display: none; }

  .step-title-area {
    flex: 1;
  }
  .step-title-main {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-dark);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .step-kor {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-light);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .step-subtitle {
    font-size: 13px;
    color: var(--text-light);
    margin-top: 3px;
  }

  .step-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .step-progress-mini {
    font-size: 12px;
    color: var(--text-light);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .step-progress-mini.all-done {
    background: var(--success-light);
    color: var(--success);
    font-weight: 600;
  }
  .chevron {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s ease, background 0.2s;
    color: var(--text-light);
    font-size: 11px;
  }
  .step-card.open .chevron {
    transform: rotate(180deg);
    background: var(--primary-ultra-light);
    color: var(--primary);
  }

  /* ===== STEP BODY ===== */
  .step-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .step-card.open .step-body {
    max-height: 2000px;
  }
  .step-body-inner {
    padding: 0 24px 24px;
  }

  .step-divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 20px;
  }

  /* ===== INFO BOX ===== */
  .info-box {
    background: var(--primary-ultra-light);
    border-left: 4px solid var(--primary);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.7;
  }
  .info-box.warning {
    background: var(--warning-light);
    border-color: var(--warning);
  }
  .info-box.success {
    background: var(--success-light);
    border-color: var(--success);
  }
  .info-box strong {
    color: var(--primary);
    font-weight: 600;
  }
  .info-box.warning strong { color: var(--warning); }
  .info-box.success strong { color: var(--success); }

  /* ===== CHECKLIST ===== */
  .checklist-section {
    margin-bottom: 20px;
  }
  .checklist-section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .checklist-section-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: var(--primary);
    border-radius: 2px;
  }

  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: background 0.2s ease;
    border: 1.5px solid transparent;
  }
  .checklist-item:hover {
    background: var(--bg);
    border-color: var(--border);
  }
  .checklist-item.checked {
    background: var(--success-light);
    border-color: rgba(0,200,83,0.2);
  }

  .check-box {
    width: 22px; height: 22px;
    min-width: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    margin-top: 1px;
  }
  .checklist-item.checked .check-box {
    background: var(--success);
    border-color: var(--success);
    box-shadow: 0 2px 8px rgba(0,200,83,0.3);
  }
  .check-tick {
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    opacity: 0;
    transform: scale(0.5) rotate(-15deg);
    transition: all 0.2s ease;
  }
  .checklist-item.checked .check-tick {
    opacity: 1;
    transform: scale(1) rotate(0);
  }
  .check-text {
    flex: 1;
    font-size: 14px;
    color: var(--text-dark);
    line-height: 1.6;
    transition: color 0.2s;
  }
  .checklist-item.checked .check-text {
    color: var(--text-light);
    text-decoration: line-through;
    text-decoration-color: rgba(0,200,83,0.5);
  }
  .check-tag {
    display: inline-block;
    background: var(--bg);
    color: var(--text-light);
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 10px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .checklist-item.checked .check-tag {
    background: rgba(0,200,83,0.1);
    color: var(--success);
  }

  /* ===== STEP ACTIONS ===== */
  .step-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn-complete-step {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 3px 12px rgba(0,102,204,0.25);
    font-family: inherit;
  }
  .btn-complete-step:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(0,102,204,0.3);
  }
  .btn-complete-step:active { transform: translateY(0); }
  .btn-complete-step.done-btn {
    background: linear-gradient(135deg, var(--success), #00E676);
    box-shadow: 0 3px 12px rgba(0,200,83,0.25);
  }
  .btn-reset-step {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    background: var(--bg);
    color: var(--text-mid);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-reset-step:hover { background: #fff; border-color: var(--primary); color: var(--primary); }

  /* ===== LINK BUTTON ===== */
  .hometax-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    background: var(--primary);
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    margin-top: 12px;
    margin-bottom: 20px;
  }
  .hometax-link:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
  }

  /* ===== BOTTOM ACTIONS ===== */
  .bottom-area {
    max-width: 860px;
    margin: 0 auto 40px;
    padding: 0 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .btn-reset-all {
    padding: 10px 20px;
    background: #fff;
    color: var(--text-mid);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-reset-all:hover { border-color: var(--warning); color: var(--warning); }
  .overall-stats {
    font-size: 14px;
    color: var(--text-light);
  }
  .overall-stats strong { color: var(--primary); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 30px; right: 24px;
    background: var(--text-dark);
    color: #fff;
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 320px;
  }
  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }
  .toast-icon {
    width: 28px; height: 28px;
    min-width: 28px;
    background: var(--success);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  /* ===== CELEBRATION ===== */
  .celebration-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: 2000;
    align-items: center;
    justify-content: center;
  }
  .celebration-overlay.show { display: flex; }
  .celebration-card {
    background: #fff;
    border-radius: 24px;
    padding: 48px 40px;
    text-align: center;
    max-width: 400px;
    animation: celebPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes celebPop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .celeb-emoji { font-size: 56px; margin-bottom: 16px; }
  .celeb-title { font-size: 24px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; }
  .celeb-sub { font-size: 15px; color: var(--text-mid); margin-bottom: 24px; line-height: 1.6; }
  .btn-celeb-close {
    padding: 12px 32px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-celeb-close:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,102,204,0.3); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    .site-header h1 { font-size: 22px; }
    .step-dots::before { display: none; }
    .step-dot-label { display: none; }
    .progress-inner { padding: 20px; }
    .step-header { padding: 16px; gap: 12px; }
    .step-body-inner { padding: 0 16px 20px; }
    .step-num-badge { width: 40px; height: 40px; min-width: 40px; font-size: 16px; }
    .step-title-main { font-size: 15px; }
    .lang-switcher { top: 12px; right: 12px; }
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="site-header">
  <!-- LANGUAGE SWITCHER -->
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="zh" onclick="switchLang('zh')">中文</button>
    <button class="lang-btn" data-lang="ko" onclick="switchLang('ko')">한국어</button>
  </div>

  <div class="header-badge"><span class="dot"></span> <span data-i18n="header.badge">2025年 综合所得税申告期</span></div>
  <h1 data-i18n="header.title">🇰🇷 综合所得税申告引导</h1>
  <p data-i18n="header.sub1">모두채움 / 단순경비율 신고 · 홈택스 전자신고</p>
  <div class="header-sub" data-i18n="header.sub2">根据国税厅官方说明书制作 · 适用于简单经费率申告者</div>
</div>

<!-- PROGRESS OVERVIEW CARD -->
<div class="progress-card">
  <div class="progress-inner">
    <div class="progress-top">
      <div>
        <div class="progress-label" data-i18n="progress.label">申告进度</div>
      </div>
      <div class="progress-pct" id="pct-display">0<span>%</span></div>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="main-progress-bar"></div>
    </div>
    <div class="step-dots" id="step-dots-container">
      <!-- Filled by JS -->
    </div>
  </div>
</div>

<!-- MAIN CONTENT: 8 STEP CARDS -->
<div class="main-content" id="steps-container">
</div>

<!-- BOTTOM AREA -->

// =========================================================
// STATE
// =========================================================
const STORAGE_KEY = 'tax_filing_checklist_v2';
let checkedItems = {};
let currentLang = 'zh';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      checkedItems = data.items || {};
      currentLang = data.lang || 'zh';
    }
  } catch(e) { checkedItems = {}; currentLang = 'zh'; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ items: checkedItems, lang: currentLang }));
}

// =========================================================
// LANGUAGE SWITCHING
// =========================================================
function switchLang(lang) {
  currentLang = lang;
  document.body.classList.toggle('ko', lang === 'ko');
  document.documentElement.lang = lang === 'ko' ? 'ko-KR' : 'zh-CN';
  
  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  
  // Update all i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (I18N[lang][key]) el.innerHTML = I18N[lang][key];
  });
  
  saveState();
  renderAll();
}

function t(key) {
  return I18N[currentLang][key] || key;
}

// =========================================================
// RENDER
// =========================================================
function renderAll() {
  renderStepDots();
  renderStepCards();
  updateProgress();
}

function getText(obj) {
  if (typeof obj === 'string') return obj;
  return obj[currentLang] || obj.zh || '';
}

function getTagText(item) {
  if (!item.tag) return '';
  const tag = getText(item.tag);
  return `<span class="check-tag">${tag}</span>`;
}

function renderStepDots() {
  const container = document.getElementById('step-dots-container');
  const shortLabels = {
    1: { zh: '登录', ko: '로그인' },
    2: { zh: '基本信息', ko: '기본사항' },
    3: { zh: '综合所得', ko: '종합소득' },
    4: { zh: '所得扣除', ko: '소득공제' },
    5: { zh: '税额扣除', ko: '세액공제' },
    6: { zh: '加算税', ko: '가산세' },
    7: { zh: '已缴纳税', ko: '기납부' },
    8: { zh: '缴税/退税', ko: '납부/환급' },
  };
  container.innerHTML = STEPS_DATA.map(step => {
    const { total, done } = getStepProgress(step);
    const isDone = total > 0 && done === total;
    const isActive = getActiveStep() === step.id;
    return `
      <div class="step-dot-item ${isDone?'done':''} ${isActive?'active':''}" onclick="scrollToStep(${step.id})">
        <div class="step-dot ${isDone?'done':''} ${isActive?'active':''}">
          <span class="dot-num">${step.id}</span>
        </div>
        <div class="step-dot-label">${shortLabels[step.id][currentLang]}</div>
      </div>
    `;
  }).join('');
}

function getActiveStep() {
  for(const step of STEPS_DATA) {
    const { total, done } = getStepProgress(step);
    if(done < total) return step.id;
  }
  return STEPS_DATA[STEPS_DATA.length-1].id;
}

function renderStepCards() {
  const container = document.getElementById('steps-container');
  container.innerHTML = STEPS_DATA.map(step => renderStepCard(step)).join('');
}

function renderStepCard(step) {
  const { total, done } = getStepProgress(step);
  const isDone = total > 0 && done === total;
  const isActive = getActiveStep() === step.id;
  const isOpen = isActive || isDone;

  const infoHtml = step.info ? `
    <div class="info-box ${step.info.type}">
      ${getText(step.info.content)}
    </div>
  ` : '';

  const sectionsHtml = step.sections.map(sec => `
    <div class="checklist-section">
      <div class="checklist-section-title">${getText(sec.title)}</div>
      ${sec.items.map(item => renderCheckItem(item)).join('')}
    </div>
  `).join('');

  const linkHtml = step.link ? `
  <a href="${step.link.url}" target="_blank" class="hometax-link">
    <img src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://hometax.go.kr/&size=16" 
         width="16" height="16" 
         style="border-radius: 3px; vertical-align: middle;">
    ${getText(step.link.text)}
  </a>
  ` : '';

  const progressText = isDone
    ? `<span class="step-progress-mini all-done">✓ ${t('step.allComplete')}</span>`
    : `<span class="step-progress-mini">${done}/${total}</span>`;

  return `
    <div class="step-card ${isDone?'completed-card':''} ${isActive?'active-card':''} ${isOpen?'open':''}" id="step-card-${step.id}">
      <div class="step-header" onclick="toggleStep(${step.id})">
        <div class="step-num-badge">
          <span class="num-text">${step.id}</span>
        </div>
        <div class="step-title-area">
          <div class="step-title-main">
            ${step.icon} ${getText(step.title)}
            <span class="step-kor">${step.kor}</span>
          </div>
          <div class="step-subtitle">${getText(step.subtitle)}</div>
        </div>
        <div class="step-right">
          ${progressText}
          <div class="chevron">▼</div>
        </div>
      </div>
      <div class="step-body">
        <div class="step-body-inner">
          <div class="step-divider"></div>
          ${infoHtml}
          ${linkHtml}
          ${sectionsHtml}
          <div class="step-actions">
            <button class="btn-complete-step ${isDone?'done-btn':''}" onclick="markStepComplete(${step.id})">
              ${isDone ? '✓ ' + t('step.done') : '✓ ' + t('step.mark')}
            </button>
            <button class="btn-reset-step" onclick="resetStep(${step.id}, event)">🗘 ${t('step.reset')}</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderCheckItem(item) {
  const isChecked = !!checkedItems[item.id];
  const tagHtml = item.tag ? getTagText(item) : '';
  return `
    <div class="checklist-item ${isChecked?'checked':''}" onclick="toggleItem('${item.id}')">
      <div class="check-box">
        <span class="check-tick">✓</span>
      </div>
      <div class="check-text">${getText(item.text)}${tagHtml}</div>
    </div>
  `;
}

// =========================================================
// INTERACTIONS
// =========================================================
function toggleStep(stepId) {
  const card = document.getElementById(`step-card-${stepId}`);
  card.classList.toggle('open');
}

function scrollToStep(stepId) {
  const card = document.getElementById(`step-card-${stepId}`);
  if(card) {
    card.classList.add('open');
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function toggleItem(itemId) {
  checkedItems[itemId] = !checkedItems[itemId];
  if(!checkedItems[itemId]) delete checkedItems[itemId];
  saveState();

  let stepId = null;
  for(const step of STEPS_DATA) {
    for(const sec of step.sections) {
      if(sec.items.find(i => i.id === itemId)) { stepId = step.id; break; }
    }
    if(stepId) break;
  }

  const itemEl = document.querySelector(`[onclick="toggleItem('${itemId}')"]`);
  if(itemEl) {
    const isChecked = !!checkedItems[itemId];
    itemEl.classList.toggle('checked', isChecked);
  }

  if(stepId) updateStepCard(stepId);
  updateProgress();
}

function updateStepCard(stepId) {
  const step = STEPS_DATA.find(s => s.id === stepId);
  if(!step) return;
  const { total, done } = getStepProgress(step);
  const isDone = total > 0 && done === total;
  const card = document.getElementById(`step-card-${stepId}`);
  if(!card) return;

  card.classList.toggle('completed-card', isDone);

  const miniEl = card.querySelector('.step-progress-mini');
  if(miniEl) {
    if(isDone) {
      miniEl.className = 'step-progress-mini all-done';
      miniEl.textContent = `✓ ${t('step.allComplete')}`;
    } else {
      miniEl.className = 'step-progress-mini';
      miniEl.textContent = `${done}/${total}`;
    }
  }

  const completeBtn = card.querySelector('.btn-complete-step');
  if(completeBtn) {
    completeBtn.classList.toggle('done-btn', isDone);
    completeBtn.textContent = isDone ? `✓ ${t('step.done')}` : `✓ ${t('step.mark')}`;
  }
}

function markStepComplete(stepId) {
  const step = STEPS_DATA.find(s => s.id === stepId);
  if(!step) return;
  const allItems = step.sections.flatMap(s => s.items);
  allItems.forEach(item => { checkedItems[item.id] = true; });
  saveState();

  const card = document.getElementById(`step-card-${stepId}`);
  if(card) {
    card.querySelectorAll('.checklist-item').forEach(el => {
      el.classList.add('checked');
    });
  }

  updateStepCard(stepId);
  updateProgress();

  showToast(`${t('step.allComplete')} 「${getText(step.title)}」！`);

  const allDone = STEPS_DATA.every(s => {
    const { total: t2, done: d } = getStepProgress(s);
    return t2 > 0 && d === t2;
  });
  if(allDone) {
    setTimeout(() => document.getElementById('celebration').classList.add('show'), 800);
  }
}

function resetStep(stepId, event) {
  event.stopPropagation();
  const step = STEPS_DATA.find(s => s.id === stepId);
  if(!step) return;
  const allItems = step.sections.flatMap(s => s.items);
  allItems.forEach(item => { delete checkedItems[item.id]; });
  saveState();

  const card = document.getElementById(`step-card-${stepId}`);
  if(card) {
    card.querySelectorAll('.checklist-item').forEach(el => el.classList.remove('checked'));
    card.classList.remove('completed-card');
  }

  updateStepCard(stepId);
  updateProgress();
}

function resetAll() {
  if(!confirm(t('toast.resetConfirm'))) return;
  checkedItems = {};
  saveState();
  renderAll();
}

// =========================================================
// PROGRESS CALCULATION
// =========================================================
function getStepProgress(step) {
  const allItems = step.sections.flatMap(s => s.items);
  const total = allItems.length;
  const done = allItems.filter(i => !!checkedItems[i.id]).length;
  return { total, done };
}

function updateProgress() {
  let totalAll = 0, doneAll = 0;
  STEPS_DATA.forEach(step => {
    const { total, done } = getStepProgress(step);
    totalAll += total; doneAll += done;
  });
  const pct = totalAll === 0 ? 0 : Math.round(doneAll / totalAll * 100);

  document.getElementById('main-progress-bar').style.width = pct + '%';
  document.getElementById('pct-display').innerHTML = `${pct}<span>%</span>`;
  
  const itemsText = t('stats.items');
  document.getElementById('overall-stats').innerHTML = `共 <strong>${doneAll}</strong> / <strong>${totalAll}</strong> ${itemsText}`;

  renderStepDots();
}

// =========================================================
// TOAST
// =========================================================
let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  const msgEl = document.getElementById('toast-msg');
  msgEl.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('show');
}

// =========================================================
// INIT
// =========================================================
function init() {
  loadState();
  switchLang(currentLang);

  // Auto-open the first incomplete step
  const firstIncomplete = STEPS_DATA.find(step => {
    const { total, done } = getStepProgress(step);
    return done < total;
  });
  if(firstIncomplete) {
    const card = document.getElementById(`step-card-${firstIncomplete.id}`);
    if(card) card.classList.add('open');
  }
}

// Run immediately since script is at end of body
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
