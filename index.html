<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Archive | Index</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #191919;       /* Kakao 深色模式背景 */
            --card-bg: #252525;        /* 卡片背景 */
            --text-main: #FFFFFF;      /* 主文字颜色 */
            --text-sub: #8E8E8E;       /* 副文字颜色 */
            --accent-color: #FEE500;   /* Kakao 经典黄 */
            --hover-bg: #2F2F2F;       /* 悬停背景 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 1. 关键修改：让 body 成为 flex 容器并占满全屏高度 */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* 保证至少占满一屏高度 */
        }

        /* 2. 关键修改：让容器自动撑开，占据除 footer 以外的所有空间 */
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            flex: 1; 
            animation: fadeIn 0.8s ease-out;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 32px;
            background: linear-gradient(145deg, #333, #222);
            margin-bottom: 16px;
            display: inline-block;
            border: 1px solid #333;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        p.description {
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .article-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .article-item {
            background-color: var(--card-bg);
            padding: 20px 24px;
            border-radius: 18px;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .article-item:hover {
            background-color: var(--hover-bg);
            transform: translateY(-2px);
            border-color: #444;
        }

        .article-info .title {
            display: block;
            color: var(--text-main);
            font-weight: 400;
            font-size: 1.05rem;
            margin-bottom: 4px;
        }

        .article-info .date {
            color: var(--text-sub);
            font-size: 0.8rem;
            font-weight: 300;
        }

        .arrow {
            width: 20px;
            height: 20px;
            stroke: var(--text-sub);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 3. 关键修改：页脚样式，确保它在最底部 */
        footer {
            padding: 40px 20px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        footer a {
            color: var(--text-sub);
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="profile-img">
                <svg viewBox="0 0 24 24" fill="none" style="padding: 20px;">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#FEE500" stroke-width="2"/>
                    <path d="M2 17L12 22L22 17" stroke="#FEE500" stroke-width="2"/>
                    <path d="M2 12L12 17L22 12" stroke="#FEE500" stroke-width="2"/>
                </svg>
            </div>
            <h1>我的分享库</h1>
            <p class="description">探索、记录、分享。这里是我所有的技术笔记与文章。</p>
        </header>

        <main class="article-list">
            <a href="https://shane2bytes.github.io/docshare/infinityDice_260415.html" class="article-item">
                <div class="article-info">
                    <span class="title">infinity Dice 玩家广告压力缓解提案</span>
                    <span class="date">2026.04.15 · 인피니티 다이스_광고 완화 제안</span>
                </div>
                <svg class="arrow" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"></path></svg>
            </a>
            </main>
    </div>

    <footer>
        <p>&copy; 2026 Powered by Shane</p>
    </footer>

</body>
</html>
