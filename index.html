<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shane | Index</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;          /* Apple 纯黑背景 */
            --secondary-bg: #1c1c1e;     /* iOS 系统层级背景色 */
            --text-main: #f5f5f7;        /* Apple 常用近白色 */
            --text-sub: #86868b;         /* Apple 常用副文本灰色 */
            --accent-blue: #0071e3;      /* Apple 经典蓝 */
            --card-hover: #2c2c2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased; /* 字体抗锯齿，更有果味 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            padding: 80px 24px 40px;
            flex: 1;
            /* 苹果风格的淡入动画更自然、更慢 */
            animation: appleFade 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header {
            text-align: center;
            margin-bottom: 64px;
        }

        .profile-img {
            width: 72px;
            height: 72px;
            border-radius: 16px; /* 苹果的圆角比 Kakao 稍尖一点，呈现“连续曲率”感 */
            background: linear-gradient(180deg, #333 0%, #111 100%);
            margin-bottom: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem; /* 更大胆的标题 */
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 12px;
        }

        p.description {
            color: var(--text-sub);
            font-size: 1.1rem;
            font-weight: 400;
            max-width: 400px;
            margin: 0 auto;
        }

        /* 列表部分 - 模仿 iOS 设置列表或 Apple News 风格 */
        .article-list {
            display: flex;
            flex-direction: column;
            background-color: var(--secondary-bg);
            border-radius: 20px;
            overflow: hidden; /* 确保条目不会超出圆角容器 */
        }

        .article-item {
            padding: 18px 24px;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.3s ease;
            /* 条目间的超细分割线 */
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .article-item:last-child {
            border-bottom: none;
        }

        .article-item:hover {
            background-color: var(--card-hover);
        }

        .article-info .title {
            display: block;
            color: var(--text-main);
            font-weight: 500;
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .article-info .date {
            color: var(--text-sub);
            font-size: 0.85rem;
        }

        /* 苹果风格的细箭头 */
        .arrow {
            width: 16px;
            height: 16px;
            stroke: var(--text-sub);
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.6;
        }

        footer {
            padding: 48px 24px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-sub);
            letter-spacing: 0.02em;
        }

        footer a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* 苹果标志性的平滑淡入 */
        @keyframes appleFade {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .container { padding-top: 60px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="profile-img">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L12 22M2 12L22 12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="12" cy="12" r="9" stroke="white" stroke-width="1.5"/>
                </svg>
            </div>
            <h1>Archive</h1>
            <p class="description">Notes, thoughts, and technical shares.</p>
        </header>

        <main class="article-list">
            <a href="https://shane2bytes.github.io/docshare/infinityDice_260415.html" class="article-item">
                <div class="article-info">
                    <span class="title">infinity Dice 玩家广告压力缓解提案</span>
                    <span class="date">Apr 15, 2026 · Game Design</span>
                </div>
                <svg class="arrow" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"></path></svg>
            </a>
            
            </main>
    </div>

    <footer>
        <p>Copyright &copy; 2026 Shane.</p>
    </footer>

</body>
</html>
